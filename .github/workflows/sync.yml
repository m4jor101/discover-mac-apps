name: Sync Discover Mac Apps List

on:
  schedule:
   
   - cron: '0 0 * * 0'
  workflow_dispatch: 

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch Latest Markdown from API
        run: |
          curl -s https://discovermacapps.com/api/export/github-list -o README.md

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          
          # Only commit and push if the README actually changed
          if git diff-index --quiet HEAD; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-sync apps from discovermacapps.com"
            git push
          fi
